<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projectile Simulation</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    h1 { text-align: center; }
    .controls { margin: 20px 0; }
  </style>
</head>
<body>

<h1>Projectile Motion Simulation</h1>

<p>
Interactive simulation of a projectile under gravity.
Adjust angle and velocity.
</p>

<div class="controls">
  <label>Angle (degrees): <span id="angleVal">45</span></label><br>
  <input type="range" id="angle" min="0" max="90" value="45">

  <br><br>

  <label>Velocity (m/s): <span id="velVal">20</span></label><br>
  <input type="range" id="velocity" min="1" max="50" value="20">
</div>

<div id="plot"></div>

<script>
const g = 9.81;

function computeTrajectory(v0, thetaDeg) {
  const theta = thetaDeg * Math.PI / 180;

  const t_flight = (2 * v0 * Math.sin(theta)) / g;
  const t = [];
  const x = [];
  const y = [];

  const N = 100;

  for (let i = 0; i <= N; i++) {
    let ti = (i / N) * t_flight;
    t.push(ti);

    let xi = v0 * Math.cos(theta) * ti;
    let yi = v0 * Math.sin(theta) * ti - 0.5 * g * ti * ti;

    x.push(xi);
    y.push(yi);
  }

  return { x, y };
}

function updatePlot() {
  const angle = document.getElementById("angle").value;
  const velocity = document.getElementById("velocity").value;

  document.getElementById("angleVal").innerText = angle;
  document.getElementById("velVal").innerText = velocity;

  const traj = computeTrajectory(velocity, angle);

  const data = [{
    x: traj.x,
    y: traj.y,
    mode: "lines",
    name: "trajectory"
  }];

  const layout = {
    xaxis: { title: "x (m)" },
    yaxis: { title: "y (m)" },
    margin: { t: 20 }
  };

  Plotly.newPlot("plot", data, layout);
}

document.getElementById("angle").oninput = updatePlot;
document.getElementById("velocity").oninput = updatePlot;

// initial plot
updatePlot();
</script>

</body>
</html>
